seed: 42
output_dir: outputs/yelp

data:
  parquet_path: data/processed/yelp_monthly.parquet
  date_col: month
  unit_col: city
  target_col: target_value
  feature_cols:
    - target_value
    - mapped_nights_per_resident
    - density
    - entire_share
    - occupancy
    - multi_share
    - authenticity
    - commodification
    - noise
    - crowding
    - month_sin
    - month_cos
  exogenous_cols:
    - mapped_nights_per_resident
    - density
    - entire_share
    - occupancy
    - multi_share
    - month_sin
    - month_cos
  mask_cols: []
  input_length: 96
  horizon: 12
  seasonal_period: 12
  stride: 1
  add_mask_channels: false
  train_ratio: 0.7
  val_ratio: 0.15
  min_history: 24

model:
  d_model: 64
  num_blocks: 4
  num_heads: 8
  ff_expand: 4
  dropout: 0.1
  num_samples: 12
  anchor_rho: 2
  use_lpu: true
  use_convffn: true
  attention_mode: sparse
  offset_mode: learned
  patch_size: 1
  max_offset: 6.0
  kernel_size: 3
  downsample_between_blocks: true
  probabilistic: true

train:
  epochs: 50
  batch_size: 32
  lr: 0.0003
  weight_decay: 0.0001
  warmup_ratio: 0.05
  patience: 10
  grad_clip: 1.0
  amp: true
  num_workers: 0
